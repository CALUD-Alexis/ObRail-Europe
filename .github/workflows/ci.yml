name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '20'

jobs:
  backend-tests:
    name: Backend — Tests & Typecheck
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: obrail_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: TypeScript typecheck
        working-directory: backend
        run: npm run typecheck

      - name: Load database schema and data
        run: PGPASSWORD=postgres psql -h localhost -U postgres -d obrail_db -f postgres/init.sql

      - name: Run backend tests
        working-directory: backend
        run: npm test
        env:
          NODE_ENV: test
          APP_KEY: paKXSmXmVKDmjnIjECmHCZMmWOBpkSzN
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USER: postgres
          DB_PASSWORD: postgres
          DB_DATABASE: obrail_db
          PORT: 3333
          HOST: localhost
          LOG_LEVEL: error
          SESSION_DRIVER: cookie
          TZ: UTC

  frontend-build:
    name: Frontend — Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install

      - name: Build frontend
        working-directory: frontend
        run: npm run build

  e2e-tests:
    name: Frontend — Tests E2E (Cypress)
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-build]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Start Docker stack (backend, frontend, db)
        run: docker compose up -d --build backend frontend db
        timeout-minutes: 5

      - name: Wait for backend to be healthy
        run: |
          for i in $(seq 1 30); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3333/health || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "Backend ready"
              break
            fi
            echo "Waiting for backend... (attempt $i)"
            sleep 3
          done

      - name: Wait for frontend to be ready
        run: |
          for i in $(seq 1 20); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "Frontend ready"
              break
            fi
            echo "Waiting for frontend... (attempt $i)"
            sleep 3
          done

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Cypress dependencies
        working-directory: frontend
        run: npm install

      - name: Run Cypress E2E tests
        working-directory: frontend
        run: npm run test:e2e
        env:
          CYPRESS_BASE_URL: http://localhost

      - name: Upload screenshots on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: cypress-screenshots
          path: frontend/cypress/screenshots

      - name: Stop Docker stack
        if: always()
        run: docker compose down

  docker-build:
    name: Docker — Build images
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-build]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker images
        run: docker compose build --no-cache
